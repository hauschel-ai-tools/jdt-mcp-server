name: Build and Release

on:
  push:
    branches:
      - main
      - feature/**
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: main
    container:
      image: registry.cg.internal/ci/jdt-mcp-maven:latest
    env:
      MAVEN_OPTS: >-
        -Djdk.xml.maxGeneralEntitySizeLimit=0
        -Djdk.xml.entityExpansionLimit=0
        -Djdk.xml.totalEntitySizeLimit=0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write version file
        run: |
          if [[ "${FORGEJO_REF_NAME}" == v* ]]; then
            echo "${FORGEJO_REF_NAME#v}" > org.naturzukunft.jdt.mcp.product/.version
          else
            echo "dev-${FORGEJO_REF_NAME}" > org.naturzukunft.jdt.mcp.product/.version
          fi
          echo "Version: $(cat org.naturzukunft.jdt.mcp.product/.version)"
        env:
          FORGEJO_REF_NAME: ${{ forgejo.ref_name }}

      - name: Build and package
        run: mvn -B --no-transfer-progress clean package

      - name: Run smoke tests
        run: tests/smoke-test.sh
        timeout-minutes: 5

      - name: Create release
        if: startsWith(forgejo.ref, 'refs/tags/v')
        run: |
          TAG="${FORGEJO_REF_NAME}"
          API_URL="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases"

          # Generate changelog from commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV_TAG..HEAD" --no-merges | head -20)
          else
            CHANGELOG="- Erster Release"
          fi

          # Build release body using jq to avoid YAML/heredoc issues
          INSTALL_URL="https://git.changinggraph.org/ai-tools/jdt-mcp-server/raw/tag/${TAG}/install.sh"
          UNINSTALL_URL="https://git.changinggraph.org/ai-tools/jdt-mcp-server/raw/tag/${TAG}/uninstall.sh"
          REPO_URL="https://git.changinggraph.org/ai-tools/jdt-mcp-server/src/tag/${TAG}"

          TABLE="| Plattform | Architektur | Install-Script | Manuell |
|---|---|---|---|
| Linux | x86_64, aarch64 | ✅ | tar.gz |
| macOS | x86_64, aarch64 (Apple Silicon) | ✅ | tar.gz |
| Windows | x86_64 | - | zip + jdtls-mcp.cmd |"

          BODY="## Unterstützte Plattformen

${TABLE}

## Changes

${CHANGELOG}

## Installation / Update (Linux & macOS)

\`\`\`bash
curl -sSL ${INSTALL_URL} | bash
\`\`\`

Das Script erkennt OS/Architektur automatisch und führt bei bestehender Installation ein Update durch. Danach: \`cd /dein/java-projekt && claude\`

## Installation (Windows)

1. ZIP-Archiv herunterladen und entpacken (z.B. nach \`%LOCALAPPDATA%\\jdtls-mcp\`)
2. \`claude mcp add -s user jdt-mcp %LOCALAPPDATA%\\jdtls-mcp\\bin\\jdtls-mcp.cmd\`

## Deinstallation

\`curl -sSL ${UNINSTALL_URL} | bash\`

## Dokumentation

${REPO_URL}"

          # Create release
          RELEASE_ID=$(curl -s -X POST "$API_URL" \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$TAG" --arg name "JDT MCP Server $TAG" --arg body "$BODY" \
              '{tag_name: $tag, name: $name, body: $body}')" \
            | jq -r '.id')

          echo "Created release $RELEASE_ID"

          # Upload assets
          UPLOAD_URL="${API_URL}/${RELEASE_ID}/assets"
          for file in \
            org.naturzukunft.jdt.mcp.product/target/products/jdtls-mcp-linux.gtk.x86_64.tar.gz \
            org.naturzukunft.jdt.mcp.product/target/products/jdtls-mcp-linux.gtk.aarch64.tar.gz \
            org.naturzukunft.jdt.mcp.product/target/products/jdtls-mcp-macosx.cocoa.x86_64.tar.gz \
            org.naturzukunft.jdt.mcp.product/target/products/jdtls-mcp-macosx.cocoa.aarch64.tar.gz \
            org.naturzukunft.jdt.mcp.product/target/products/jdtls-mcp-win32.win32.x86_64.zip; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file")
              echo "Uploading $NAME..."
              curl -s -X POST "${UPLOAD_URL}?name=${NAME}" \
                -H "Authorization: token ${FORGEJO_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@${file}"
              echo " done."
            fi
          done
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_REF_NAME: ${{ forgejo.ref_name }}
